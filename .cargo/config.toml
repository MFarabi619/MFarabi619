# ======================================= #
# ======================================= #
# ======================================= #
[env]
DEFMT_LOG         = "info,embedded_test=warn"
NETWORK_WIFI_SSID = ""
NETWORK_WIFI_PSK  = ""
OTA_DEVICE_IP     = "10.0.0.95"
# ======================================= #
# ======================================= #
# ======================================= #
[alias]
loco       = ["run", "--"]
playground = ["run", "--example", "playground"]

tui = ["run", "--release", "--package", "tui"]
simulator = ["tui", "--bin", "simulator"]
simulator-minimal = ["tui", "--bin", "simulator-minimal"]

microtop = ["run", "--package", "microtop"]
firmware = ["run", "--release", "--package", "firmware" ]
firmware-debug = ["run", "--package", "firmware"]
# ======================================== #
# ======================================== #
# ======================================== #
stm32 = ["firmware", "--target", "thumbv7em-none-eabihf"]
stm32h723zg = ["stm32", "--bin", "stm32h723zg"]
# ======================================== #
# ======= if running from root  ========== #
# =========== cargo +esp ... ============= #
# ======================================== #
esp = ["firmware", "--config", "unstable.build-std=[\"core\",\"alloc\"]", "--features", "esp32s3"]
esp32 = ["esp", "--target", "xtensa-esp32-none-elf"]
esp32s3 = ["esp", "--target", "xtensa-esp32s3-none-elf"]
probe-rs-debug-esp32s3 = [
    "firmware-debug",
    "--config",
    "unstable.build-std=[\"core\",\"alloc\"]",
    "--target",
    "xtensa-esp32s3-none-elf",
]

probe-rs-debug-stm32h723zg = [
    "firmware-debug",
    "--target",
    "thumbv7em-none-eabihf",
    "--bin",
    "stm32h723zg",
]

build-ota = [
    "build",
    "--release",
    "--package",
    "firmware",
    "--config",
    "unstable.build-std=[\"core\",\"alloc\"]",
    "--target",
    "xtensa-esp32s3-none-elf",
    "--features", "esp32s3",
    "--bin",
    "esp32s3"
]

flash-ota = ["build-ota"]
# ======================================== #
# ======================================== #
# ======================================== #
[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip stm32h723zg"
[target.xtensa-esp32s3-none-elf]
runner = [
    "probe-rs",
    "run",
    "--chip",
    "esp32s3",
    "--log-format",
    "{[{L:bold:green:4}]%bold} {ff:bold:magenta}:{l:bold:cyan} :: {s:bold:white}",
]
[target.xtensa-esp32-none-elf]
runner = "espflash flash --monitor --chip esp32"
