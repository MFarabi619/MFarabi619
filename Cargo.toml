[workspace]
resolver = "3"
# default-members = ["web"]
exclude = ["ml", "firmware"]
members = [
    # "web",
    "tui",
    "tests/e2e",
    "apps/readme",
    "learning/rust/3.1-variables",
    "learning/rust/3.3-functions",
    "learning/rust/3.4-comments",
    "learning/rust/3.5-control-flow",
    "learning/rust/4.1-what-is-ownership",
    "learning/rust/4.2-references-and-borrowing",
    "learning/rust/4.3-the-slice-type",
    "learning/rust/5.1-defining-and-instantiating-structs",
    "learning/rust/5.2-an-example-program-using-structs"
]

[package]
name = "web"
version = "0.1.0"
authors = ["Mumtahin Farabi <mfarabi619@gmail.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
dioxus = { version = "0.7.1", features = ["router", "fullstack"] }

[features]
default = ["web"]
web = ["dioxus/web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]
server = ["dioxus/server"]
