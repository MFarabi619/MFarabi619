[workspace]
resolver = "3"
default-members = ["web"]
exclude = ["ml", "firmware"]
members = [
    "web",
    "tui",
    "tests/e2e",
    "apps/readme",
    "libs/ui",
    "libs/primitives",
    "libs/dioxus-attributes",
    "learning/rust/3.1-variables",
    "learning/rust/3.3-functions",
    "learning/rust/3.4-comments",
    "learning/rust/3.5-control-flow",
    "learning/rust/4.1-what-is-ownership",
    "learning/rust/4.2-references-and-borrowing",
    "learning/rust/4.3-the-slice-type",
    "learning/rust/5.1-defining-and-instantiating-structs",
    "learning/rust/5.2-an-example-program-using-structs"
]

[workspace.dependencies]
dioxus = { version = "0.7.1", features = ["router", "fullstack"] }
dioxus-sdk-time = "0.7.0"
dioxus-primitives = { path = "libs/primitives" }
ui = { path = "libs/ui" }
tracing = { version = "0.1", features = ["std"] }
lucide-dioxus = { version = "2.45.0", features = ["all-icons"] }
