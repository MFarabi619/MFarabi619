[workspace]
resolver = "3"
# default-members = ["web"]
exclude = ["ml"]
members = [
  ".",
  "firmware",
  "web",
  "tui",
  "tests/e2e",
  "apps/readme"
]

[workspace.dependencies]
serde_json = "1"
loco-rs = "0.16.4"
dioxus-sdk-time = "0.7.0"
dioxus-primitives.path = "libs/primitives"
serde = { version = "1", features = ["derive"] }
tracing = { version = "0.1", features = ["std"] }
lucide-dioxus = { version = "2.45.0", features = ["all-icons"] }
dioxus = { version = "0.7.3", features = ["router", "fullstack"] }

[package]
name = "api"
publish = false
edition = "2024"
version = "0.1.0"
default-run = "api-cli"

[[bin]]
name = "api-cli"
path = "src/bin/main.rs"
required-features = []

[dev-dependencies]
rstest = "0.21.0"
serial_test = "3.1.1"
loco-rs = { workspace = true, features = ["testing"] }
insta = { version = "1.34.0", features = ["redactions", "yaml", "filters"] }

[dependencies]
chrono = "0.4"
axum = "0.8.1"
regex = "1.11.1"
tracing = "0.1.40"
validator = "0.20"
include_dir = "0.7"
unic-langid = "0.9.4"
async-trait = "0.1.74"
serde.workspace = true
dioxus.workspace = true
loco-rs.workspace = true
serde_json.workspace = true
migration.path = "migration"
scalar_api_reference = "0.1"
uuid = { version = "1.6.0", features = ["v4"] }
axum-extra = { version = "0.12", features = ["form"] } # /view engine
loco-openapi = { version = "0.1", features = ["full"] }
fluent-templates = { version = "0.8.0", features = ["tera"] } # view engine i18n
tracing-subscriber = { version = "0.3.17", features = ["env-filter", "json"] }
tokio = { version = "1.33.0", default-features = false, features = ["rt-multi-thread"] }
sea-orm = { version = "1.1.19", features = ["macros", "sqlx-sqlite", "sqlx-postgres", "runtime-tokio-rustls"]}
