[workspace]
version = "0.1.0"
name = "MFarabi619"
requires-pixi = ">=0.40"
channels = ["https://prefix.dev/conda-forge"]
authors = ["Mumtahin Farabi <mfarabi619@gmail.com>"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64", "linux-aarch64"]

[tasks]
rviz.cmd = "rviz2"
test.cmd = "pytest apps/robot/test -v"
bridge.cmd = "ros2 run foxglove_bridge foxglove_bridge"
teleop.cmd = "ros2 run teleop_twist_keyboard teleop_twist_keyboard"
simulator = { cmd = "ros2 launch robot simulator.launch.py", depends-on = [ "build" ] }
cad = { cmd = "python main.py", env = { YACV_HOST = "127.0.0.1", YACV_PORT = "32323" }, cwd = "libs/cad" }

[system-requirements]
libc = { family = "glibc", version = "2.34" }

[dependencies]
make = "*"
cmake = "*"
ninja = "*"
python = "*"
compilers = "*"
pkg-config = "*"
colcon-common-extensions = "*"

[target]
linux.dependencies.libgl-devel = "*"
osx.dependencies.watchfiles = "*"
linux-64.dependencies.watchfiles = "*"
win.activation.scripts = ["install/setup.bat"]
unix.activation.scripts = ["install/setup.bash"]
osx.pypi-dependencies = { build123d = "*", yacv-server = "*", bd-warehouse = "*" }
linux-64.pypi-dependencies = { build123d = "*", yacv-server = "*", bd-warehouse = "*" }
win-64.tasks.build = "colcon build --merge-install --paths apps/robot --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY"
unix.tasks.build = "colcon build --symlink-install --paths apps/robot --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY"
linux-aarch64.tasks.robot = { cmd = "ros2 run robot hat_mdd10sm", depends-on = [ "build" ] }

[environments]
default = { features = ["lyrical"] }

[feature]
lyrical.target.linux-aarch64.dependencies.lgpio = "*"
lyrical.channels = ["https://prefix.dev/robostack-lyrical"]
lyrical.dependencies = { ros-lyrical-desktop = "*", ros-lyrical-foxglove-bridge = "*", ros-lyrical-ros-gz = "*", ros-lyrical-generate-parameter-library = "*", ros-lyrical-generate-parameter-library-py = "*" }
