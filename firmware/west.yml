manifest:
    remotes:
        - name: zephyrproject
          url-base: https://github.com/zephyrproject-rtos
        - name: wolfssl
          url-base: https://github.com/wolfSSL

    projects:
        - name: zephyr-lang-rust
          remote: zephyrproject
          revision: 5c486f17eef5d4b1fed5076cd2be167c5f2cd706 # base for firmware/patches/zephyr-lang-rust-*.patch
          path: firmware/modules/lang/rust

        - name: wolfssl
          remote: wolfssl
          revision: v5.9.1-stable
          path: firmware/modules/crypto/wolfssl

        - name: wolfssh
          remote: wolfssl
          revision: v1.5.0-stable
          path: firmware/modules/lib/wolfssh

        - name: zephyr
          remote: zephyrproject
          revision: f1ff557f96f74a6d82d8b290bc4488ee5f93c483 # main~2: before HAL CS timing regression
          import:
              path-prefix: firmware
              name-allowlist:
                  # ESP32
                  - hal_espressif
                  - hal_xtensa
                  # STM32
                  - hal_stm32
                  - hal_st
                  # Core
                  - cmsis
                  - cmsis_6
                  - mbedtls
                  - mbedtls-3.6
                  - mcuboot
                  - tf-psa-crypto
                  # Filesystems
                  - fatfs
                  - littlefs
                  # Libraries
                  - libmetal
                  - segger
                  - mipi-sys-t
                  - picolibc
                  # Debug
                  - percepio
                  - net-tools

    self:
        path: firmware
