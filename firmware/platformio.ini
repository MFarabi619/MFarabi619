[platformio]
default_envs = cyd

[env]
framework = arduino
platform = espressif32

upload_speed = 150000

[env:cyd]
monitor_speed = 115200
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board = freenove_esp32_s3_wroom

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
  moononournation/GFX Library for Arduino@1.6.5
