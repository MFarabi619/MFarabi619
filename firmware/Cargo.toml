[package]
edition = "2024"
version = "0.1.0"
name = "firmware"
rust-version = "1.88"
default-run = "microvisor"
authors = ["Mumtahin Farabi"]
# Every test must be declared explicitly with `harness = false` because
# `#[embedded_test::tests]` generates its own entry point and we're
# `#![no_std]` — the default cargo test harness tries to link `libtest`
# which doesn't exist without std. Cargo has no way to set `harness`
# globally, so autotests stays off and every new test file needs a
# 4-line `[[test]]` block below.
autotests = false

[[bin]]
test = false
name = "microvisor"
path = "src/bin/microvisor.rs"

# ─── integration tests ──────────────────────────────────────────────────────
# Auto-discovery disabled (see `autotests = false` above). Each new test
# file needs a 4-line `[[test]]` entry here. The `harness = false` flag
# is mandatory — it tells cargo not to inject a libtest-based main() so
# `#[embedded_test::tests]` can generate its own.

[[test]]
harness = false
name = "hello"
path = "tests/hello.rs"

