CONFIG_WIFI=n
CONFIG_WIFI_NM=n
CONFIG_NET_L2_WIFI_SHELL=n
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=n
CONFIG_NET_DHCPV4_SERVER=n

# WiFi management + credentials API stay on even though the radio driver is off:
# the Rust bindgen wrapper (firmware/patches/zephyr-lang-rust-ffi-wrappers.patch)
# hardcodes net_mgmt(NET_REQUEST_WIFI_*) and wifi_credentials_*() calls without
# Kconfig guards. Disabling these breaks the bindgen step before any link.
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_SHELL=n
CONFIG_NET_IF_MAX_IPV4_COUNT=1
CONFIG_NET_IF_MAX_IPV6_COUNT=1

CONFIG_NET_NATIVE=y
CONFIG_NET_L2_PPP=y
CONFIG_NET_L2_PPP_MGMT=y
CONFIG_NET_CONTEXT_RCVTIMEO=y

CONFIG_MODEM=y
CONFIG_MODEM_CELLULAR=y
CONFIG_MODEM_CELLULAR_APN=""
CONFIG_MODEM_CMUX_MTU=160
CONFIG_MODEM_CELLULAR_CHAT_BUFFER_SIZE=256

CONFIG_PM_DEVICE_RUNTIME=y

CONFIG_MODEM_LOG_LEVEL_DBG=y
CONFIG_NET_LOG=y
CONFIG_NET_L2_PPP_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=4096
