# Walter is a router (cellular uplink + WiFi AP downstream); it never acts as
# a wifi STA. Override the shared default (WIFI_USAGE_MODE_STA_AP=y) with
# AP-only so the ESP32 driver doesn't spin up an unused STA iface that
# competes for the default-iface slot and confuses DHCP server reply routing.
CONFIG_WIFI_USAGE_MODE_AP=y
CONFIG_NET_DHCPV4_SERVER_OPTION_DNS_ADDRESS="192.168.4.1"
