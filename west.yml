manifest:
    self:
        path: .

    remotes:
        - name: zephyrproject
          url-base: https://github.com/zephyrproject-rtos

        - name: wolfssl
          url-base: https://github.com/wolfSSL

        - name: craigpeacock
          url-base: https://github.com/craigpeacock

    projects:
        - name: mm-iot-zephyr
          remote: craigpeacock
          revision: main
          path: vendor/modules/lib/morsemicro
          submodules: true
          import: false

        - name: zephyr-lang-rust
          remote: zephyrproject
          path: vendor/modules/lang/rust
          revision: 404fcefdbab0f2711cd342a1fab9d2eda52a1ba9 # main 2026-05-27

        - name: wolfssl
          remote: wolfssl
          revision: master
          path: vendor/modules/crypto/wolfssl

        - name: wolfssh
          remote: wolfssl
          revision: master
          path: vendor/modules/lib/wolfssh

        - name: zephyr
          remote: zephyrproject
          revision: fbfc5f19636 # main 2026-05-19, modem vendor-struct refactor
          import:
              path-prefix: vendor
              name-allowlist:
                  # - qemu
                  # - percepio
                  # - net-tools

                  - mcuboot
                  - hal_xtensa
                  - hal_espressif

                  # - hal_stm32
                  # - hal_st

                  - cmsis
                  # - cmsis_6

                  - mbedtls
                  - mbedtls-3.6
                  # tf-psa-crypto is the sibling source tree mbedtls 4.x requires (per
                  # vendor/modules/crypto/mbedtls/CMakeLists.txt:346). Without this
                  # entry, any image with CONFIG_WIFI_ESP32=y fails at CMake-configure
                  # because WIFI_ESP32 selects PSA_CRYPTO which pulls mbedtls full build.
                  - tf-psa-crypto

                  # - fatfs
                  # - littlefs

                  - zcbor
                  - segger # RTT logging
                  # - nanopb # protobuf
                  # - libmetal
                  - picolibc
                  - mipi-sys-t
