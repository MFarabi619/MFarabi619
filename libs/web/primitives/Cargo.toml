[package]
name = "dioxus-primitives"
version = "0.0.1"
edition = "2021"
rust-version = "1.80.0"
keywords = ["gui", "dioxus", "components", "primitives"]
categories = ["gui", "wasm"]
authors = ["Dioxus Labs", "DogeDark"]
license = "MIT OR Apache-2.0"
homepage = "https://dioxuslabs.com"
repository = "https://github.com/DioxusLabs/components"

[dependencies]
num-integer = "0.1.46"
dioxus.workspace = true
tracing.workspace = true
dioxus-sdk-time.workspace = true
dioxus-attributes.path = "../dioxus-attributes"
time = { version = "0.3.44", features = ["std", "macros", "parsing", "local-offset"] }

[build-dependencies]
lazy-js-bundle = "0.6.2"

[features]
default = ["router"]
router = ["dioxus/router"]
web = ["time/wasm-bindgen"]
