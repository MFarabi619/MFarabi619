CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
# CONFIG_WIFI_USAGE_MODE_STA=y
CONFIG_WIFI_USAGE_MODE_STA_AP=y
# STA auto-DHCP needs NET_DHCPV4 (the client) which we disabled. We're never
# bringing up STA as a real client anyway (channel conflict with our AP).
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=n
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y

CONFIG_ESP32_WIFI_IRAM_OPT=y
CONFIG_ESP32_WIFI_TX_BA_WIN=16
CONFIG_ESP32_WIFI_RX_BA_WIN=16
CONFIG_ESP32_WIFI_RX_IRAM_OPT=y
CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM=y
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=y
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=y
CONFIG_ESP32_WIFI_AMSDU_TX_ENABLED=y

# Wifi driver alloc pool — bumped from defaults (10/32/32) to keep up with
# tailscale STUN/DERP UDP bursts. Symptom of undersizing was repeated
# `esp32_wifi_adapter: memory allocation failed` followed by
# `esp32_wifi: Failed to send packet` once a ceratina starts pushing UDP.
# Static buffers don't fragment; bumping them costs ~1.6 KB each at boot.
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=16
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=64
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=64
