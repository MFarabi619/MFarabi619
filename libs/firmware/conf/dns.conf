CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_CACHE=y
CONFIG_DNS_RESOLVER_CACHE_MAX_ENTRIES=128
CONFIG_DNS_RESOLVER_MAX_SERVERS=3
CONFIG_DNS_RESOLVER_AI_MAX_ENTRIES=32
CONFIG_DNS_RESOLVER_MAX_NAME_LEN=128
CONFIG_DNS_RESOLVER_MAX_ANSWER_SIZE=2048
CONFIG_DNS_NUM_CONCUR_QUERIES=32
CONFIG_DNS_SERVER1="1.1.1.1"
CONFIG_DNS_SERVER2="9.9.9.9"
CONFIG_DNS_SERVER3="8.8.8.8"
# To add per-provider secondaries, bump CONFIG_DNS_RESOLVER_MAX_SERVERS to 6
# and uncomment. Note: Zephyr tries servers in order with per-server timeout,
# so longer chains mean longer worst-case fallback (~5s × N).
# CONFIG_DNS_SERVER4="1.0.0.1"          # Cloudflare secondary
# CONFIG_DNS_SERVER5="149.112.112.112"  # Quad9 secondary
# CONFIG_DNS_SERVER6="8.8.4.4"          # Google secondary

# DNS_SERVER_IP_ADDRESSES gates Zephyr's mDNS server-slot registration at
# resolve.c:2643-2655 — without it, dns_resolve_init_default takes a no-op
# path and `.local` lookups fail with DNS_EAI_SYSTEM/ENOENT. Empty
# DNS_SERVER1..N entries are skipped (resolve.c:638-642), so we don't need
# to hardcode any unicast servers — DHCP still provides those.
CONFIG_DNS_SERVER_IP_ADDRESSES=y

# MDNS_RESOLVER would let Walter itself look up .local hostnames — we don't.
# Only the responder (so clients can reach walter.local) is required.
CONFIG_MDNS_RESOLVER=n
CONFIG_MDNS_RESPONDER=y
