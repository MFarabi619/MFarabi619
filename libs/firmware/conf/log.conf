CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_CMDS=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_RUNTIME_FILTERING=y

# Globally bumping to DBG (4) lit up kernel mutex spam and overflowed the
# deferred log buffer. Default INF (3); use `log enable dbg <module>` at
# runtime instead.
#CONFIG_LOG_DEFAULT_LEVEL=4
# Zephyr issue #66171 — starves shell thread under DBG load.
#CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_LOG_DBG_COLOR_BLUE=y
CONFIG_LOG_INFO_COLOR_GREEN=y
CONFIG_LOG_OUTPUT_FORMAT_LINUX_TIMESTAMP=y

CONFIG_NET_LOG=y
CONFIG_WIFI_LOG_LEVEL_INF=y
CONFIG_WIFI_NM_LOG_LEVEL_INF=y
# CONFIG_WIFI_LOG_LEVEL_DBG=y
# CONFIG_WIFI_NM_LOG_LEVEL_DBG=y
CONFIG_NET_DHCPV4_LOG_LEVEL_DBG=n
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=y
CONFIG_NET_MGMT_EVENT_LOG_LEVEL_DBG=n
CONFIG_WIFI_CREDENTIALS_LOG_LEVEL_DBG=n
CONFIG_NET_CONNECTION_MANAGER_LOG_LEVEL_DBG=n
