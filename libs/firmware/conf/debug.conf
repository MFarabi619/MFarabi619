CONFIG_SYMTAB=y

CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y

CONFIG_INIT_STACKS=y
CONFIG_STACK_SENTINEL=y

CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=y

# === legacy modem / DCE control (Hayes-era, mostly vestigial on IoT) ===
# A/                  # repeat last command line
# ATD                 # dial
# ATE                 # command echo on/off
# ATH                 # hang up
# ATI                 # identification info
# ATO                 # return to online data mode
# ATQ                 # result-code suppression
# ATV                 # verbose vs numeric result codes
# ATZ                 # reset to stored profile
# ATS3                # command line terminator char (CR)
# ATS4                # response formatting char (LF)
# ATS5                # backspace char
# AT\Q                # local flow control
# AT&C                # DCD line behaviour
# AT&D                # DTR line behaviour
# AT&F                # restore factory defaults
# AT&K                # flow control
# AT&S                # DSR line behaviour
# AT&V                # dump current config
# AT&W                # save config to profile
# AT^RESET            # reset the modem

# === identity / info ===
# AT+CGMI             # manufacturer
# AT+CGMM             # model
# AT+CGMR             # firmware revision
# AT+CGSN             # IMEI
# AT+GSN              # IMEI (alt spelling)
# AT+CLAC             # list all commands (this list)

# === serial / interface config ===
