CONFIG_LOG=y
CONFIG_LOG_CMDS=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_RUNTIME_FILTERING=y

CONFIG_LOG_MODE_IMMEDIATE=y
# CONFIG_LOG_MODE_DEFERRED=y

CONFIG_LOG_DBG_COLOR_BLUE=y
CONFIG_LOG_INFO_COLOR_GREEN=y

CONFIG_LOG_BACKEND_SHOW_LEVEL=n                  # <inf> <wrn> <err> <dbg> tags
CONFIG_LOG_BACKEND_SHOW_TIMESTAMP=y

CONFIG_LOG_OUTPUT_FORMAT_LINUX_TIMESTAMP=y       # [ 0.234567]
# CONFIG_LOG_OUTPUT_FORMAT_TIME_TIMESTAMP=y      # 00:00:00.234
# CONFIG_LOG_OUTPUT_FORMAT_DATE_TIMESTAMP=y      # 1970-01-01T00:00:00.234
# CONFIG_LOG_OUTPUT_FORMAT_CUSTOM_TIMESTAMP=y    # log_custom_timestamp_set()
# CONFIG_LOG_OUTPUT_FORMAT_ISO8601_TIMESTAMP=y   # 1970-01-01T00:00:00.234Z
