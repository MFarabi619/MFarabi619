patches:
  - path: zephyr-lang-rust-xtensa.patch
    sha256sum: 18182e5c1207e71f8bba9fd8247d41b818b40836c5d8cc359e09a2da3319c436
    module: lang-rust
    author: Mumtahin Farabi
    email: farabi@apidaesystems.ca
    date: 2026-05-23
    upstreamable: true
    comments: |
      Upstream zephyr-lang-rust HEAD doesn't map xtensa in _rust_map_target().
      Adds esp32 / esp32s2 / esp32s3 mappings and CRATE_NAME / FEATURES args
      to rust_cargo_application(). module: lang-rust matches the name in
      vendor/modules/lang/rust/zephyr/module.yml; the project name in
      west.yml (zephyr-lang-rust) is intentionally different and would cause
      `west patch` to silently skip the entry.

  - path: zephyr-lang-rust-kconfig-overflow.patch
    sha256sum: 53f73e2ddcbc644ff329f13983806a941448ccf1b1dfab9a41efcab121746cdd
    module: lang-rust
    author: Mumtahin Farabi
    email: farabi@apidaesystems.ca
    date: 2026-05-23
    upstreamable: true
    comments: |
      zephyr-build emits hex Kconfig values as `pub const FOO: usize = 0xHEX;`
      unconditionally. On xtensa-esp32s3 `usize` is 32-bit and Kconfig values
      like CONFIG_SOC_GPIO_VALID_DIGITAL_IO_PAD_MASK (0x0001FFFFFC000000) don't
      fit, producing a hard `overflowing_literals` error. Add the lint to the
      existing #[allow(...)] on hex constants. Value is still truncated but
      that matches `usize` semantics on this target and the truncated constants
      aren't referenced by any of our code yet.

      Proper upstream fix would be to emit `u64` for hex values that exceed
      u32::MAX, but this minimal patch unblocks the build.

  - path: zephyr/modem-cellular-sqn-gm02s-1000ms-reset.patch
    sha256sum: 6f60535fc27141e6aa72d4a997ef42f691a1298936b70dbe272e626a832bf530
    module: vendor/zephyr
    author: Mumtahin Farabi
    email: farabi@apidaesystems.ca
    date: 2026-05-13
    upstreamable: true
    comments: |
      Zephyr's default reset_pulse_duration_ms=100 isn't long enough to
      fully clear CMUX state on Sequans GM02SP firmware LR8.2.1.0-61488
      and newer. After a Walter reboot without full power-cycle, the modem
      stays in CMUX mode; subsequent boots send raw ATE0 which the modem
      doesn't decode, causing init script timeouts.

      DPTechnics' own walter-arduino MOTA/passthrough sketches use a
      1000ms reset pulse for this exact reason — that's the proven-good
      value on this hardware. Bumping the Zephyr driver's pulse to match.

      Cost: ~900ms additional boot time. Worth it to eliminate the
      flash-flap-reboot recovery loop.

  - path: zephyr/modem-cellular-sqn-gm02s-disable-psm-edrx.patch
    sha256sum: ed24cf4bb6a99c40456d412a7dff50937e676bb735234f8116c351e46ca2c226
    module: vendor/zephyr
    author: Mumtahin Farabi
    email: farabi@apidaesystems.ca
    date: 2026-05-13
    upstreamable: true
    comments: |
      Sequans GM02SP defaults to enabling PSM (Power Save Mode, 3GPP TS 24.008)
      and eDRX (Extended DRX) after registration. Both add hundreds of
      milliseconds of wake latency to the first packet of any new burst —
      catastrophic for interactive web browsing, which sends sparse bursts
      followed by waits for the response. Send AT+CPSMS=0 and AT+CEDRXS=0
      during the init chat script while the modem is in CFUN=4 (RF off),
      before CMUX and PPP bring-up. This makes the modem stay in continuous-
      reception mode, trading some battery life for latency. Walter is
      mains-powered as a router so battery is not a concern.

  - path: zephyr/modem-cellular-carrier-gated-ppp-dead.patch
    sha256sum: 8824a202a90e5c3dabf2a77f4dfee45cb9577dda103a39d2e21c83dcd63cc49f
    module: vendor/zephyr
    author: Mumtahin Farabi
    email: farabi@apidaesystems.ca
    date: 2026-05-12
    upstreamable: true
    comments: |
      modem_cellular's registered-state handler unconditionally tears down
      PPP on BOTH MODEM_CELLULAR_EVENT_DEREGISTERED (from `+CEREG: 2` URC)
      and MODEM_CELLULAR_EVENT_PPP_DEAD (from NET_EVENT_PPP_PHASE_DEAD).
      Two failure modes hit us routinely on Sequans GM02SP + Walter:
       1. The modem briefly cycles `+CEREG: 2 → +CEREG: 1` within ~1ms
          immediately after `ATD*99***1#` returns CONNECT, during PDP
          context binding. Driver's DEREGISTERED handler tears down PPP
          before LCP can finish.
       2. After LCP completes and IPCP starts, the modem sometimes
          retransmits its LCP Configure-Req (likely due to slow ACK from
          us under DBG log load). RFC 1661 §4.6 says we must reset NCPs
          and bounce LCP back to REQUEST_SENT, transitioning phase
          NETWORK → DEAD → ESTABLISH. Driver's PPP_DEAD handler tears
          down PPP just as IPCP would assign an IPv4 address.
      Both teardowns happen while the modem's CMUX link is still healthy
      (carrier still ON). This patch gates both handlers on
      `!net_if_is_carrier_ok()` — only re-dial when the modem has truly
      dropped its CMUX link to us, not when PPP is renegotiating or the
      modem's CEREG URC is flapping. Carrier_off is set elsewhere by the
      driver when CMUX DLCIs actually close, so genuine disconnections
      still trigger the re-dial path.

  - path: zephyr/modem-cellular-sqn-gm02s-await-sysstart.patch
    sha256sum: d79e7b550720e24e984b2ec5043402c82abbd076ab595bb06612a7d15775d3b0
    module: vendor/zephyr
    author: Mumtahin Farabi
    email: farabi@apidaesystems.ca
    date: 2026-05-17
    upstreamable: true
    comments: |
      Zephyr's SQN GM02SP init chat script blindly fires ATE0 after a fixed
      startup_time_ms=2000 timer post-reset. SQN GM02SP cold-boot is 3-10s
      depending on firmware revision and saved state — when ATE0 lands on
      an unready modem, no OK comes back, the 10s script timeout fires, and
      the state machine retries in a non-deterministic loop. Every Walter
      init failure we've observed has matched this signature.

      DPTechnics' canonical Walter libraries block on the "+SYSSTART" URC
      instead of guessing a timer:
       - walter-esp-idf/src/WalterModem.cpp:4367 — _runCmd({}, "+SYSSTART", ...)
       - walter-arduino/src/WalterModem.cpp:4367 — same pattern

      "+SYSSTART" is Sequans' documented boot-completion URC. Adds a
      MODEM_CHAT_MATCH_DEFINE for it, prepends a wait-step at the head of
      the init script, and bumps the script timeout 10→30s to fit worst-
      case boot + the 12 AT cmds with margin.

  - path: zephyr/modem-cellular-sqn-gm02s-cmee-verbose.patch
    sha256sum: 317897c0ec65a3beaec6054d8c9d23e828f319a89dc3087969ae5b75f9b33018
    module: vendor/zephyr
    author: Mumtahin Farabi
    email: farabi@apidaesystems.ca
    date: 2026-05-17
    upstreamable: true
    comments: |
      Zephyr's SQN init sets AT+CMEE=1 (numeric error codes per 3GPP TS
      27.007 §9.1). DPTechnics' Walter libraries use AT+CMEE=2 (verbose
      text) — see walter-esp-idf/src/WalterModem.cpp configCMEErrorReports().
      Verbose text makes log triage trivially faster ("+CME ERROR: SIM not
      inserted" vs "+CME ERROR: 10"). The abort_matches list keys on the
      literal "ERROR" substring which CMEE=2 responses still contain, so
      error abort behavior is preserved.

