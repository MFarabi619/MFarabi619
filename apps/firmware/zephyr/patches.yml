patches:
    - path: zephyr/probe-rs.patch
      sha256sum: 6d27e1e3287b475230b1d95c6a2d13915d6549e7c4b6afd44e5b5cdb848e3b11
      module: zephyrproject/zephyr
      author: Mumtahin Farabi
      email: mfarabi619@gmail.com
      date: 2026-06-06
      upstreamable: true
      comments: |
          Make `west flash -r probe-rs` work fleet-wide on mcuboot images.
          probe_rs.py: add --base-address / --gdb-init-file runner args;
          spawn gdb ourselves so -x survives preset injection.
          espressif/common: auto-register probe-rs args (chip, jtag, bin,
          image_off base-address) + esp32 --esp-skip-flashed.
          stm32f3_disco/board.cmake: register probe-rs (was missing).

    - path: lang-rust/zephyr-macros-description.patch
      sha256sum: a3475a7b667714efef3cecde1cbf00d782532a52fef057b4c4d3d7424add757f
      module: lang-rust
      author: Mumtahin Farabi
      email: mfarabi619@gmail.com
      date: 2026-06-25
      upstreamable: true
      comments: |
          zephyr-macros/Cargo.toml: `descriptions` → `description`. Manifest
