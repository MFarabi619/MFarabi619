CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_CACHE=y
CONFIG_DNS_RESOLVER_CACHE_MAX_ENTRIES=128

CONFIG_DNS_NUM_CONCUR_QUERIES=32

# Keep AI_MAX_ENTRIES <= 8 — the resolver allocates
# `dns_addrinfo[AI_MAX_ENTRIES]` on the stack inside
# dns_resolve_name_internal when CACHE=y. At 32, that's ~5 KB which
# overflows the 5200-byte shell stack and silently wedges the resolver.
CONFIG_DNS_RESOLVER_AI_MAX_ENTRIES=8

CONFIG_DNS_RESOLVER_MAX_NAME_LEN=128
CONFIG_DNS_RESOLVER_MAX_ANSWER_SIZE=2048
