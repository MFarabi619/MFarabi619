CONFIG_CRC=y
CONFIG_REBOOT=y
CONFIG_OH_MY_ZEPHYR=y
CONFIG_KERNEL_SHELL=y
CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-8

CONFIG_SHELL=y
CONFIG_SHELL_ALIASES=y
CONFIG_SHELL_WILDCARD=n
CONFIG_SHELL_CMDS_SELECT=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_CMD_BUFF_SIZE=512
CONFIG_SHELL_DEFAULT_TERMINAL_WIDTH=200
CONFIG_SHELL_ALIASES_FILE="apps/firmware/programs/shell.aliases.txt"

CONFIG_UART_SHELL=y

CONFIG_LOG=y
CONFIG_LOG_CMDS=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DBG_COLOR_BLUE=y
CONFIG_LOG_INFO_COLOR_GREEN=y
CONFIG_LOG_RUNTIME_FILTERING=y

CONFIG_SHELL_BACKEND_RTT=n
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_SHELL_LOG_OUTPUT_LEVEL=n
CONFIG_SHELL_LOG_OUTPUT_TIMESTAMP=n

CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_SHOW_LEVEL=n
CONFIG_LOG_BACKEND_SHOW_TIMESTAMP=n
CONFIG_LOG_OUTPUT_FORMAT_LINUX_TIMESTAMP=n

CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_BUFFER=0
CONFIG_LOG_BACKEND_RTT_OUTPUT_BUFFER_SIZE=256

CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_SEGGER_RTT_BUFFER_SIZE_DOWN=256
CONFIG_SEGGER_RTT_MAX_NUM_UP_BUFFERS=1
CONFIG_SEGGER_RTT_MAX_NUM_DOWN_BUFFERS=1

CONFIG_BUILD_OUTPUT_META=y
CONFIG_BUILD_OUTPUT_COMPRESS_DEBUG_SECTIONS=y

CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

CONFIG_HWINFO=y
CONFIG_HWINFO_SHELL=y
