tests:
    qemu.riscv32:
        tags: e2e
        min_ram: 2048
        min_flash: 1024
        platform_allow: qemu_riscv32
        extra_conf_files:
            - test.conf

    esp32s3.walter:
        tags: esp32s3 build
        sysbuild: true
        build_only: true
        platform_allow: walter/esp32s3/procpu
        required_snippets:
            - wifi-credentials
            - espressif-flash-16M
            - espressif-psram-2M
            - espressif-psram-wifi

    esp32s3.xiao:
        tags: esp32s3 build
        sysbuild: true
        build_only: true
        platform_allow: xiao_esp32s3/esp32s3/procpu
        required_snippets:
            - wifi-credentials
            - espressif-flash-8M
            - espressif-psram-8M
            - espressif-psram-wifi

    esp32s3.devkitc:
        tags: esp32s3 build
        sysbuild: true
        build_only: true
        platform_allow: esp32s3_devkitc/esp32s3/procpu
        required_snippets:
            - wifi-credentials
            - espressif-flash-8M
            - espressif-psram-8M
            - espressif-psram-wifi

    esp32s3.8048S043:
        tags: esp32s3 build
        sysbuild: true
        build_only: true
        platform_allow: esp32s3_8048S043/esp32s3/procpu
        required_snippets:
            - wifi-credentials
            - espressif-flash-16M
            - espressif-psram-8M
            - espressif-psram-wifi

    esp32.cyd28:
        tags: esp32 build
        build_only: true
        platform_allow: esp32_devkitc/esp32/procpu
        required_snippets:
            - cyd28

    esp32s3.xiao.sense:
        tags: esp32s3 build
        sysbuild: true
        build_only: true
        platform_allow: xiao_esp32s3/esp32s3/procpu/sense
        extra_conf_files:
            - ../../libs/zephyr-lib-sqlite/sqlite.conf
        required_snippets:
            - wifi-credentials
            - espressif-flash-8M
            - espressif-psram-8M
            - espressif-psram-wifi

    stm32f3.disco:
        tags: stm32f3 build
        build_only: true
        platform_allow: stm32f3_disco@E/stm32f303xc

# https://docs.zephyrproject.org/latest/develop/test/ztest.html
# https://docs.zephyrproject.org/latest/build/sysbuild/images.html
# https://docs.zephyrproject.org/latest/build/kconfig/setting.html
# https://docs.zephyrproject.org/latest/develop/test/twister.html#twister-harnesses
# https://docs.zephyrproject.org/latest/develop/application/index.html#third-party-library-code
