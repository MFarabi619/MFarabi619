CONFIG_NET_HOSTNAME="walter"

CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y

CONFIG_ESP32_WIFI_TX_BA_WIN=32
CONFIG_ESP32_WIFI_RX_BA_WIN=32
CONFIG_ESP32_WIFI_AMSDU_TX_ENABLED=y
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=16
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=64
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=64

CONFIG_POWEROFF=y
CONFIG_PM_DEVICE=y
CONFIG_REGULATOR=y

CONFIG_LOG_BUFFER_SIZE=4096

CONFIG_NET_PKT_FILTER=y
CONFIG_NET_PKT_RX_COUNT=256
CONFIG_NET_PKT_TX_COUNT=256
CONFIG_NET_PKT_FILTER_IPV4_HOOK=y

CONFIG_NET_IPV4_NAT=y
CONFIG_NET_IPV4_FORWARDING=y
CONFIG_NET_IPV4_CONN_TRACK_MAX_NUM=256
CONFIG_NET_IPV4_IPTABLE_RULE_MAX_NUM=16

CONFIG_NET_L2_PPP=y
CONFIG_NET_L2_PPP_MGMT=y
CONFIG_NET_L2_PPP_OPTION_MRU=y
CONFIG_NET_L2_PPP_OPTION_DNS_USE=y
CONFIG_NET_L2_PPP_MAX_CONFIGURE_REQ_RETRANSMITS=4

CONFIG_MODEM=y
CONFIG_MODEM_STATS=y
CONFIG_MODEM_AT_SHELL=y
CONFIG_MODEM_CMUX_MTU=1500
CONFIG_MODEM_CELLULAR=y
CONFIG_MODEM_CELL_INFO=y
CONFIG_MODEM_CELLULAR_APN="m2minternet.apn" # or "rogersdefault.apn"
CONFIG_MODEM_CELLULAR_CHAT_BUFFER_SIZE=4096
CONFIG_MODEM_CELLULAR_UART_BUFFER_SIZES=2048

CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_CHANNELS=4
CONFIG_TASK_WDT_MIN_TIMEOUT=1000
