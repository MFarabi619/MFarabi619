CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_PAGE_LAYOUT=y

CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_FILE_SYSTEM_LITTLEFS=y

# CONFIG_SQLITE=y  # re-enable once Rust SQLite backend is extended to non-xtensa bare-metal
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=262144

CONFIG_POSIX_API=y
CONFIG_POSIX_FSYNC=y
CONFIG_POSIX_FD_MGMT=y
CONFIG_POSIX_ENV_SHELL=y
CONFIG_POSIX_UNAME_SHELL=y
CONFIG_POSIX_FILE_SYSTEM=y
CONFIG_POSIX_FILE_SYSTEM_R=y
CONFIG_POSIX_C_LANG_SUPPORT_R=y

CONFIG_DYNAMIC_THREAD=y
CONFIG_DYNAMIC_THREAD_POOL_SIZE=2

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SHELL_STACK_SIZE=16384
