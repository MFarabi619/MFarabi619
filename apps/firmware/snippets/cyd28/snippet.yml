name: cyd28
description: |
  LCDWIKI E32R28T / E32N28T 2.8" CYD-class ESP32 display module
  (ILI9341 over SPI2/HSPI, XPT2046 resistive touch over bitbang SPI,
  microSD over SPI3/VSPI, GPIO backlight on IO21).
  Piggybacks on esp32_devkitc base, disables PSRAM defaults.
  Display + SD + touch + LED + shell — no WiFi (won't fit alongside
  LVGL on no-PSRAM WROOM-32E).
boards:
  esp32_devkitc/esp32/procpu:
    append:
      EXTRA_DTC_OVERLAY_FILE: esp32_devkitc.overlay
      EXTRA_CONF_FILE: esp32_devkitc.conf
