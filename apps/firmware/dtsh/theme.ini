[styles]

dtsh.default   = default on default
dtsh.error     = bold red1
dtsh.warning   = bold dark_orange
dtsh.apologies = dim italic
dtsh.disabled  = strike dim

dtsh.fs.file     = default
dtsh.fs.dir      = bold light_sky_blue1
dtsh.fs.notfound = dim red1

dtsh.link.local = cyan1 underline
dtsh.link.www   = medium_orchid1 underline

dtsh.list.header = bold light_steel_blue
dtsh.tree.header = bold light_steel_blue

dtsh.dt.path_branch = grey62
dtsh.dt.path_node   = bold cyan1

dtsh.dt.description    = italic dark_khaki
dtsh.dt.node_name      = bold light_steel_blue1
dtsh.dt.unit_name      = light_steel_blue1
dtsh.dt.unit_addr      = dim medium_purple2

dtsh.dt.device_label   = bold light_salmon1
dtsh.dt.node_label     = italic light_salmon1

dtsh.dt.compat_str     = medium_orchid1
dtsh.dt.binding_compat = bold medium_orchid1
dtsh.dt.binding_desc   = bold italic dark_khaki

dtsh.dt.cb_depth         = grey50
dtsh.dt.is_child_binding = bold plum2
dtsh.dt.cb_anchor        = light_steel_blue1

dtsh.dt.alias  = bold dark_sea_green2
dtsh.dt.chosen = italic plum2

dtsh.dt.bus    = bold gold1
dtsh.dt.on_bus = gold3

dtsh.dt.irq_number   = bold tan
dtsh.dt.irq_priority = dim tan

dtsh.dt.reg_addr = light_coral
dtsh.dt.reg_size = dim light_coral

dtsh.dt.depend_on     = light_cyan3
dtsh.dt.depend_failed = bold red1
dtsh.dt.required_by   = default

dtsh.dt.vendor_prefix = sky_blue1
dtsh.dt.vendor_name   = bold sky_blue1

dtsh.dt.dep_ordinal   = dim grey62
dtsh.dt.status_enabled  = bold green3
dtsh.dt.status_disabled = dim italic grey50
dtsh.dt.property        = medium_purple1

dtsh.dtvalue.bool      = default
dtsh.dtvalue.true      = bold pale_green3
dtsh.dtvalue.false     = light_goldenrod2
dtsh.dtvalue.int       = cornflower_blue
dtsh.dtvalue.int_array = cornflower_blue
dtsh.dtvalue.uint8     = salmon1
dtsh.dtvalue.string    = dark_olive_green3
