manifest:
    remotes:
        - name: zephyrproject
          url-base: https://github.com/zephyrproject-rtos

    projects:
        - name: zephyr
          import: true
          remote: zephyrproject
          revision: e79a0db70fc9ad33982f9786b428b115a78eaadd # 2026-06-14

        - name: zephyr-lang-rust
          remote: zephyrproject
          path: modules/lang/rust
          revision: ab3e546232bfa2f4e16d6c5156b9d9500885b4e8 # 2026-06-12

        - name: dtsh
          revision: zephyr
          path: modules/tools/dtsh
          west-commands: scripts/west-commands.yml
          url: https://github.com/dottspina/dtsh.git

        - name: mm-iot-zephyr
          import: false
          revision: main
          submodules: true
          path: modules/lib/morsemicro
          url: https://github.com/craigpeacock/mm-iot-zephyr

        - name: nuttx
          revision: nuttx-12.13.0
          path: nuttx
          url: https://github.com/apache/nuttx

        - name: nuttx-apps
          revision: nuttx-12.13.0
          path: examples/nuttx-apps
          url: https://github.com/apache/nuttx-apps

