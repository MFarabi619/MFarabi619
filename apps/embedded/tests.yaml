tests:
    qemu.riscv32:
        tags: e2e
        min_ram: 2048
        min_flash: 1024
        platform_allow: qemu_riscv32
        extra_conf_files:
            - test.conf
            - ../../libs/firmware/filesystems/fs.conf

    esp32s3.walter:
        tags: esp32s3
        sysbuild: true
        build_only: true
        platform_allow: walter/esp32s3/procpu
        required_snippets:
            - espressif-flash-16M
            - espressif-psram-2M
            - espressif-psram-wifi
            - wifi-credentials

    esp32s3.xiao:
        tags: esp32s3
        sysbuild: true
        build_only: true
        platform_allow: xiao_esp32s3/esp32s3/procpu
        required_snippets:
            - wifi-credentials
            - espressif-flash-8M
            - espressif-psram-wifi

    esp32s3.xiao.sense:
        tags: esp32s3
        sysbuild: true
        build_only: true
        platform_allow: xiao_esp32s3/esp32s3/procpu/sense
        extra_conf_files:
            - ../../libs/zephyr-lib-sqlite/sqlite.conf
        required_snippets:
            - wifi-credentials
            - espressif-flash-8M
            - espressif-psram-wifi
