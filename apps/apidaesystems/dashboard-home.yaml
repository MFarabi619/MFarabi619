                      rawQuery: true
                      rawSql: |2-
                          SELECT
                              samples.time,                                                                                
                              samples.value AS rainfall_millimeters
                          FROM samples                             
                          JOIN metrics ON metrics.id = samples.metric_id                                                   
                          WHERE samples.type = 'sensors.rainfall.v1'    
                            AND metrics.name = 'rainfall_millimeters'                                                      
                            AND $__timeFilter(samples.time)          
                          ORDER BY samples.time;   
                      sql:
