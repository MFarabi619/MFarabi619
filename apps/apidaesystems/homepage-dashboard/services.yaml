- Sites:
    - Apidae Systems:
        href: https://www.apidaesystems.ca
        siteMonitor: https://www.apidaesystems.ca
        icon: /icons/symbol.svg

- Monitoring:
    - Grafana:
        href: https://grafana.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: https://grafana.{{HOMEPAGE_VAR_DOMAIN}}
        icon: grafana.svg
        server: local
        container: grafana
        widget:
          type: grafana
          version: 2
          url: http://grafana:3000
          username: admin
          password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
    - Home Assistant:
        href: https://home-assistant.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: https://home-assistant.{{HOMEPAGE_VAR_DOMAIN}}
        icon: home-assistant.svg
        server: local
        container: homeassistant
        widget:
          type: homeassistant
          url: http://homeassistant:8123
          key: "{{HOMEPAGE_VAR_HA_ACCESS_TOKEN}}"

- Identity:
    - Authentik:
        href: https://auth.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: https://auth.{{HOMEPAGE_VAR_DOMAIN}}
        icon: authentik.svg
        server: local
        container: authentik-server
        widget:
          type: authentik
          url: http://authentik-server:9000
          key: "{{HOMEPAGE_VAR_AUTHENTIK_API_TOKEN}}"

