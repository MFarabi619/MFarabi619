- logo:
    icon: /icons/symbol.svg

- greeting:
    text_size: xl
    text: Apidae Systems

- datetime:
    text_size: l
    format:
      hour12: true
      dateStyle: long
      timeStyle: short

- resources:
    cpu: true
    disk: /
    memory: true
    uptime: true
    refresh: 1000
    network: true
    units: metric
    diskUnits: bytes

- search:
    focus: false
    target: _blank
    provider: duckduckgo
    showSearchSuggestions: true
