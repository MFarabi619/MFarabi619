[platformio]
name         = microvisor
default_envs = ceratina

lib_dir      = libs
src_dir      = firmware/src
data_dir     = firmware/data
test_dir     = firmware/tests
include_dir  = firmware/include
boards_dir   = firmware/machine

[native]
targets          = exec
platform         = native

[env:clay]
extends          = native
build_src_filter = -<*> +<../../examples/clay.c>

[embedded]
framework        = arduino
platform         = https://github.com/pioarduino/platform-espressif32.git#develop
build_flags      =
  -I firmware/include
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  '-DCONFIG_WIFI_PASS="${sysenv.WIFI_PSK}"'
  '-DCONFIG_WIFI_SSID="${sysenv.WIFI_SSID}"'

[env:ceratina]
extends          = embedded
board            = esp32-s3-devkitc1-n8r8
build_src_filter = +<*>, -<bin/*>, +<bin/${this.__env__}.cpp>, -<*.rs>

board_build.arduino.memory_type = qio_opi
board_build.filesystem          = littlefs
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L

build_flags     =
  ${embedded.build_flags}
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=1
  -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
  -DCONFIG_FREERTOS_USE_TRACE_FACILITY=1
  -DCONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=1

lib_ldf_mode    = chain
lib_compat_mode = strict
lib_deps        =
  adafruit/RTClib@2.1.4
  fastled/FastLED@3.10.3
  mobizt/ReadyMail@^0.3.8
  ewpa/LibSSH-ESP32@5.8.0
  robtillaart/SHT31@^0.5.3
  mathertel/OneButton@2.6.2
  robtillaart/TCA9548@^0.3.1
  robtillaart/CHT832X@^0.4.0
  cmb27/ModbusRTUMaster@2.0.2
  bblanchon/ArduinoJson@7.4.3
  adafruit/Adafruit LPS2X@^2.0.6
  lennarthennigs/ESP Telnet@2.2.3
  adafruit/Adafruit BusIO@^1.17.2
  sensirion/Sensirion Core@^0.7.3
  adafruit/Adafruit ADS1X15@^2.6.2
  esp32async/ESPAsyncWebServer@3.10.3
  sensirion/Sensirion I2C SCD30@^1.0.0
  sensirion/Sensirion I2C SCD4x@^1.0.0
  adafruit/Adafruit INA228 Library@^3.0.0
  https://github.com/stefangs/arduino-library-at24cxxx.git#1.2.2

monitor_filters = direct
upload_speed    = 921600
upload_port     = hwgrep://303A:1001

test_build_src  = true
test_framework  = custom

[env:walter-iot]
extends                         = embedded
board                           = esp32-s3-devkitc1-n16r2
board_upload.flash_size         = 16MB
board_upload.maximum_ram_size   = 327680
board_upload.maximum_size       = 16777216
board_build.arduino.memory_type = qio_qspi
board_build.filesystem          = littlefs
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L
board_build.arduino.partitions  = default_16MB.csv

upload_port = hwgrep://303A:1001

build_flags =
  ${embedded.build_flags}
  -DARDUINO_ESP32S3_DEV
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=1

build_src_filter = -<*> +<bin/${this.__env__}.cpp>
lib_deps         = quickspot/WalterModem@1.5.0

[env:esp32p4]
extends          = embedded
board            = esp32-p4 ; https://www.waveshare.com/esp32-p4-module-dev-kit.htm?sku=30844
build_src_filter = +<*>, -<bin/*>, +<bin/${this.__env__}.cpp>, -<*.rs>
