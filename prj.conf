CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_LOG_BACKEND_SHOW_COLOR=y
CONFIG_LOG_INFO_COLOR_GREEN=y
CONFIG_LOG_DBG_COLOR_BLUE=y
CONFIG_LOG_BACKEND_SHOW_LEVEL=n
CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_LED_STRIP=y
CONFIG_LED_STRIP_SHELL=y

CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y

CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y
CONFIG_ESP32S3_DATA_CACHE_64KB=y

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Drivers
CONFIG_I2C=y
CONFIG_ADC=y
CONFIG_SENSOR=y
# Upstream defaults both root and channel prio to I2C_INIT_PRIORITY (50),
# but the driver asserts CHANNEL > ROOT.
CONFIG_I2C_TCA954X_CHANNEL_INIT_PRIO=51
CONFIG_PM_DEVICE=y

# File systems
CONFIG_FILE_SYSTEM=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_PROMPT_BUFF_SIZE=2048
CONFIG_SHELL_DEFAULT_TERMINAL_WIDTH=200
CONFIG_SHELL_CMDS_RESIZE=y
CONFIG_SHELL_CMDS_SELECT=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_BACKEND_WEBSOCKET=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SHELL=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_DYNAMIC=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_CAPTURE=y
CONFIG_NET_SOCKETS=y

# DNS + mDNS
CONFIG_DNS_RESOLVER=y
CONFIG_MDNS_RESOLVER=y
CONFIG_MDNS_RESPONDER=y

# SNTP
CONFIG_SNTP=y
CONFIG_NET_CONFIG_CLOCK_SNTP_INIT=y

# HTTP
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_WEBSOCKET=y
CONFIG_HTTP_CLIENT=y

# WebSocket
CONFIG_WEBSOCKET_CLIENT=y

# DHCP server
CONFIG_NET_DHCPV4_SERVER=y

# WiFi
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_ESP32_WIFI_AP_STA_MODE=y

# Shell subsystems
CONFIG_LOG_CMDS=y
CONFIG_KERNEL_SHELL=y
CONFIG_DEVICE_SHELL=y
CONFIG_SENSOR_SHELL=y
CONFIG_I2C_SHELL=y
CONFIG_GPIO_SHELL=y
CONFIG_FLASH_SHELL=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_NAME=y
CONFIG_DATE_SHELL=y
CONFIG_HWINFO=y
CONFIG_HWINFO_SHELL=y
CONFIG_STATS=y
CONFIG_STATS_SHELL=y
CONFIG_STATS_NAMES=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_SHELL=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_PM_DEVICE_SHELL=y
CONFIG_DEVMEM_SHELL=y

# SD card
CONFIG_SPI=y
CONFIG_SDHC=y
CONFIG_SDMMC_STACK=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FAT_FILESYSTEM_ELM=y

# Console over built-in USB-Serial/JTAG
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Modbus
CONFIG_MODBUS=y
CONFIG_MODBUS_SERIAL=y
CONFIG_MODBUS_ROLE_CLIENT=y

# Rust
CONFIG_RUST=y
CONFIG_RUST_ALLOC=y

CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_MCUMGR_TRANSPORT_UDP=y
CONFIG_MCUMGR_TRANSPORT_UDP_IPV4=y

# System
CONFIG_ZVFS_POLL_MAX=16

# Stack sizes
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SHELL_STACK_SIZE=5200
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
