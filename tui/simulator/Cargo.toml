[package]
publish = false
edition = "2024"
name = "simulator"
default-run = "simulator-modifiers"

[dependencies]
embedded-graphics-simulator = "0.8.0"
ratatui                     = { workspace = true }
mousefood                   = { version = "0.5.0", features = ["blink"] }

[[bin]]
name = "simulator-minimal"
path = "src/minimal.rs"

[[bin]]
name = "simulator-modifiers"
path = "src/modifiers.rs"
